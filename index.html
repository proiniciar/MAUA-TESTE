<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            text-align: center;
            padding: 20px;
            background-color: #f8f9fa;
            border-bottom: 2px solid #ddd;
        }
        .header img {
            max-width: 80%; 
            height: auto;   
        }
        .header h1 {
            margin: 10px 0;
            font-size: 1em;
            color: #333;
        }
        .banner {
            background-color: #e9ecef;
            padding: 10px;
            text-align: center;
            font-size: 0.75em;
            color: #555;
            margin: 10px 0;
            border-radius: 5px;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }
        .project {
            margin: 15px 0;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .title-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        .title {
            font-size: 0.8em;
            color: #007bff;
            flex: 1;
        }
        .copy-icon {
            cursor: pointer;
            color: #007bff;
            font-size: 0.8em;
            margin-left: 10px;
            transition: color 0.3s;
        }
        .copy-icon:hover {
            color: #0056b3;
        }
        .content {
            display: none;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .content p {
            margin: 0;
        }
        .back-link {
            font-size: 10px;
            color: #007bff;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 2px;
            transition: background-color 0.3s;
        }
        .back-link:hover {
            background-color: #e0e0e0;
        }
        .go-btn {
            background-color: #007bff;
            color: white;
            border: 2px solid #007bff;
            border-radius: 25px;
            padding: 5px 10px;
            font-size: 0.6em;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            margin: 2px;
        }
        .go-btn:hover {
            background-color: white;
            color: #007bff;
        }
        .small-text {
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://proiniciar.uerj.br/pluginfile.php/1/theme_adaptable/logo/1709829991/Daiaie%20Coordenadoria%20de%20Inicia%C3%A7%C3%A3o%20COR.png" alt="Logo">
        <h1>MAUA - PROJETOS</h1>
    </div>

    <div class="back-button">
        <a href="https://proiniciar.uerj.br/course/index.php?categoryid=21" class="back-link">← Voltar</a>
    </div>

    <div class="banner">
        Espaço para apresentar e explicar o que é o MAUA Projetos!
    </div>

    <div class="container" id="projectList"></div> 

    <script>
async function loadProjects() {
    const response = await fetch('dados.csv');
    const data = await response.text();
    const lines = data.split('\n').slice(1);
    const container = document.getElementById('projectList');

    lines.forEach((line, index) => {
        const [nome, resumo, pr, local, coordenacao, email, redes] = line.split(',').map(item => item.replace(/(^"|"$)/g, '').trim());

        const projectDiv = document.createElement('div');
        projectDiv.classList.add('project');

        const titleContainer = document.createElement('div');
        titleContainer.classList.add('title-container');
        titleContainer.onclick = () => toggleContent(`content${index}`);

        const titleDiv = document.createElement('div');
        titleDiv.classList.add('title');
        titleDiv.textContent = nome;

        titleContainer.appendChild(titleDiv);

        const contentDiv = document.createElement('div');
        contentDiv.classList.add('content');
        contentDiv.id = `content${index}`;

        contentDiv.innerHTML = `
            <p><strong>Resumo:</strong> ${resumo}</p>
            <p><strong>Pró-Reitoria:</strong> ${pr}</p>
            <p><strong>Local:</strong> ${local}</p>
            <p><strong>Coordenação:</strong> ${coordenacao}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Redes Sociais:</strong> ${redes}</p>

            <hr>

            <p><strong>Responda:</strong></p>

            <label>Tem disponibilidade de horário?</label><br>
            <input type="checkbox" name="q1_${index}" value="Sim"> Sim
            <input type="checkbox" name="q1_${index}" value="Não"> Não<br><br>

            <label>Possui experiência na área?</label><br>
            <input type="checkbox" name="q2_${index}" value="Sim"> Sim
            <input type="checkbox" name="q2_${index}" value="Não"> Não<br><br>

            <label>Tem interesse em pesquisa?</label><br>
            <input type="checkbox" name="q3_${index}" value="Sim"> Sim
            <input type="checkbox" name="q3_${index}" value="Não"> Não<br><br>

            <label>Pode participar presencialmente?</label><br>
            <input type="checkbox" name="q4_${index}" value="Sim"> Sim
            <input type="checkbox" name="q4_${index}" value="Não"> Não<br><br>

            <button onclick="enviarRespostas(${index}, '${nome}')">Enviar respostas</button>
        `;

        projectDiv.appendChild(titleContainer);
        projectDiv.appendChild(contentDiv);
        container.appendChild(projectDiv);
    });
}

loadProjects();

function toggleContent(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}



function enviarRespostas(index, projeto) {

    function getResposta(name) {
        const items = document.getElementsByName(name);
        for (let i of items) {
            if (i.checked) return i.value;
        }
        return "";
    }

    const data = {
        projeto: projeto,
        q1: getResposta(`q1_${index}`),
        q2: getResposta(`q2_${index}`),
        q3: getResposta(`q3_${index}`),
        q4: getResposta(`q4_${index}`)
    };

    fetch("https://script.google.com/macros/s/AKfycbxNx0u0OkrINyFbNw_uBYv1moeOmV9sfUq554pi7LAiHYNbRDFsv3nVDiyaGQmiK-NN/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => alert("Respostas enviadas!"))
    .catch(() => alert("Erro ao enviar"));
}
</script>


</body>
</html>
